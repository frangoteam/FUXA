name: Build FUXA Electron App (Latest)

on:
  #push:
    #branches:
  #pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-24.04-arm
            arch: arm64
          - os: windows-latest
            arch: x64
          - os: macos-latest
            arch: x64
          - os: macos-latest
            arch: arm64
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install system dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew update
        brew install cairo pango pkg-config

    - name: Free up disk space (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        df -h
        # Remove Android SDK
        sudo rm -rf /usr/local/lib/android || true
        # Remove .NET SDKs
        sudo rm -rf /usr/local/share/dotnet || true
        # Remove Swift toolchain
        sudo rm -rf /usr/share/swift || true
        # Remove Haskell (GHC)
        sudo rm -rf /usr/local/.ghcup || true
        # Remove Julia
        sudo rm -rf /usr/local/julia* || true
        # Remove Chromium
        sudo rm -rf /usr/local/share/chromium || true
        # Remove Microsoft/Edge and Google Chrome builds
        sudo rm -rf /opt/microsoft /opt/google || true
        # Remove Azure CLI
        sudo rm -rf /opt/az || true
        # Remove PowerShell
        sudo rm -rf /usr/local/share/powershell || true
        # Remove CodeQL and other toolcaches
        sudo rm -rf /opt/hostedtoolcache || true
        # Remove LLVM
        sudo rm -rf /usr/lib/llvm-* || true
        # Remove Mono
        sudo rm -rf /usr/lib/mono || true
        # Remove pipx
        sudo rm -rf /opt/pipx || true
        # Remove Xcode caches and other macOS specific
        sudo rm -rf ~/Library/Caches/* || true
        sudo rm -rf ~/Library/Developer/Xcode/DerivedData/* || true
        sudo rm -rf ~/Library/Developer/Xcode/iOS\ DeviceSupport/* || true
        sudo rm -rf ~/Library/Developer/Xcode/Archives/* || true
        sudo rm -rf ~/.npm || true
        sudo rm -rf ~/.yarn || true
        sudo rm -rf ~/Library/Caches/pip || true
        sudo rm -rf ~/.gem || true
        sudo rm -rf /var/log/* || true
        sudo rm -rf /tmp/* || true
        brew cleanup || true
        df -h

    - name: Install system dependencies (Linux)
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        sudo apt-get update
        sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev pkg-config

    - name: Install system dependencies (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        choco install cairo --version=1.17.2.1
        choco install pkgconfiglite

    - name: Configure npm for reliable CI builds
      run: |
        npm config set registry https://registry.npmjs.org/
        npm config set fetch-retries 8
        npm config set fetch-retry-factor 2
        npm config set fetch-retry-mintimeout 30000
        npm config set fetch-retry-maxtimeout 300000
        npm config set audit false
        npm config set fund false
      env:
        NODE_OPTIONS: --max-old-space-size=4096 --dns-result-order=ipv4first

    - name: Clear npm cache
      run: npm cache clean --force

    - name: Install build dependencies
      if: startsWith(matrix.os, 'ubuntu')
      run: sudo apt-get update && sudo apt-get install -y build-essential unixodbc unixodbc-dev

    - name: Install server dependencies
      run: npm install && npm run build:all
      working-directory: ./server
      env:
        NODE_OPTIONS: --max-old-space-size=4096 --dns-result-order=ipv4first

    - name: Install client dependencies
      run: npm install
      working-directory: ./client
      env:
        NODE_OPTIONS: --max-old-space-size=4096 --dns-result-order=ipv4first

    - name: Build client
      run: npm run build -- --configuration=production
      working-directory: ./client
      env:
        NODE_OPTIONS: --max-old-space-size=4096 --dns-result-order=ipv4first

    - name: Install app dependencies
      run: npm install
      working-directory: ./app/electron
      env:
        NODE_OPTIONS: --max-old-space-size=4096 --dns-result-order=ipv4first

    - name: Copy server and client build to app/electron
      run: |
        mkdir -p app/electron/server
        mkdir -p app/electron/client/dist
        cp -r server/. app/electron/server/
        cp -r client/dist/. app/electron/client/dist
      shell: bash

    - name: Remove unnecessary node_modules
      run: rm -rf app/electron/server/react/pdfme/node_modules
      shell: bash

    - name: Install app dependencies for Electron
      run: npx electron-builder install-app-deps
      working-directory: ./app/electron
      env:
        ELECTRON_ARCH: ${{ matrix.arch }}

    - name: Clear electron-builder cache (macOS)
      if: matrix.os == 'macos-latest'
      run: rm -rf ~/Library/Caches/electron-builder

    - name: Package for Windows
      if: matrix.os == 'windows-latest' && matrix.arch == 'x64'
      run: npx electron-builder --win nsis --x64
      working-directory: ./app/electron

    - name: Package for Linux
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        ulimit -n 10240
        if [ "${{ matrix.arch }}" = "arm64" ]; then
          npx electron-builder --linux appimage --arm64
        else
          npx electron-builder --linux appimage --${{ matrix.arch }}
        fi
      working-directory: ./app/electron

    - name: Package for macOS
      if: matrix.os == 'macos-latest'
      run: |
        sudo sysctl -w kern.maxfiles=65536
        sudo sysctl -w kern.maxfilesperproc=65536
        ulimit -n 65536
        npx electron-builder --mac dmg --${{ matrix.arch }}
      working-directory: ./app/electron

    - name: Prepare artifacts
      run: |
        mkdir -p artifacts
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          mv dist/*.exe artifacts/FUXA-windows-x64.exe
        elif [ "${{ matrix.os }}" = "ubuntu-latest" ] && [ "${{ matrix.arch }}" = "x64" ]; then
          mv dist/*.AppImage artifacts/FUXA-linux-x64.AppImage
        elif [ "${{ matrix.os }}" = "ubuntu-24.04-arm" ] && [ "${{ matrix.arch }}" = "arm64" ]; then
          mv dist/*.AppImage artifacts/FUXA-linux-arm64.AppImage
        elif [ "${{ matrix.os }}" = "macos-latest" ] && [ "${{ matrix.arch }}" = "x64" ]; then
          mv dist/*.dmg artifacts/FUXA-macos-x64.dmg
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          mv dist/*.dmg artifacts/FUXA-macos-arm64.dmg
        fi
      working-directory: ./app/electron
      shell: bash

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: FUXA-${{ matrix.os }}-${{ matrix.arch }}
        path: app/electron/artifacts/*